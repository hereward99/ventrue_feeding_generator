<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosa's Ventrue Feeding Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Rosa's Ventrue Feeding Generator</h1>
            <p class="subtitle">Find worthy prey for your discriminating Ventrue</p>
        </header>

        <div class="card">
            <h3 class="card-title">Target Categories</h3>
            <p class="card-text">Select which types of targets are appropriate for your current scene:</p>
            <div id="categoryCheckboxes" class="checkbox-grid"></div>
            <div id="warningBox"></div>
        </div>

        <div class="card">
            <div class="input-group">
                <div class="input-wrapper">
                    <label class="label">Enter City Name</label>
                    <input type="text" id="cityInput" class="input" placeholder="e.g., New York, London, Tokyo...">
                </div>
                <button class="button" id="genBtn" disabled>Find Target</button>
            </div>
        </div>

        <div id="targetDisplay"></div>

        <footer class="footer">
            <p>Remember: The Masquerade must be maintained at all costs.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
